<!-- templates/login.py -->
<!DOCTYPE html>
<html>
<head>
    <title>Login - Creatroka</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='assets/logo_creatroka.jpeg') }}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

<div class="login-page">

    <div class="login-container">

        <h1 class="login-title">
            Creatroka
        </h1>

        <p class="login-subtitle">
            Sistem Prediksi Permintaan Buku & Optimasi Stok
        </p>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit" class="btn btn-primary" style="width: 25%; align-self: flex-end;"">
                Login
            </button>

        </form>

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
