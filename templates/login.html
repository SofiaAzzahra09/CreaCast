<!-- templates/login.py -->
<!DOCTYPE html>
<html>
<head>
    <title>Stokma - Login</title>

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='assets/logo_creatroka.jpeg') }}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>

<body>

<div class="login-wrapper">
    <div class="login-visual">
        <div class="visual-overlay"></div>
        <div class="visual-content">
            <img class="visual-logo" src="{{ url_for('static', filename='assets/logo_creatroka.jpeg') }}" alt="Logo Creatroka">
            <h2 class="visual-quote">"Mengoptimalkan Stok, Membaca Peluang Masa Depan."</h2>
            <p class="visual-desc">Kelola prediksi permintaan buku dengan akurasi tinggi dalam satu dashboard terintegrasi.</p>
        </div>
    </div>

    <div class="login-page">
        <div class="login-container">
            <h1 class="login-title">Stokma</h1>
            
            <p class="login-subtitle">
                Sistem Prediksi Permintaan Buku & Optimasi Stok 
                <span style="display: block; margin-top: 4px; font-weight: 700; color: #84cc16;">by Creatroka</span>
            </p>

            <form method="POST">
                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >

                <button type="submit" class="btn btn-primary btn-login-submit">
                    Login
                </button>
            </form>

            {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
