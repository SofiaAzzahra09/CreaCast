<!-- templates/components/modal_import.html -->
<div class="modal fade" id="modalImport" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="/data-buku/import" enctype="multipart/form-data">
                <div class="modal-header">
                    <h5 class="modal-title">Import File Excel / CSV</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Pilih File (.xls, .xlsx, .csv)</label>
                        <input 
                            type="file" 
                            name="files" 
                            accept=".xlsx, .xls, .csv, text/csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" 
                            multiple 
                            required
                        >
                    </div>
                    <p style="font-size: 12px; color: #6b7280; margin-top: -8px;">
                        *Anda dapat memilih lebih dari satu file sekaligus dengan menahan tombol Ctrl (atau Cmd di Mac) saat memilih file.
                    </p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="submit" class="btn btn-primary">Import</button>
                </div>
            </form>
        </div>
    </div>
</div>
